<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a New Password — College Voting</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="navbar-brand">
            <div class="brand-icon"></div>College Voting
        </a>
        <ul class="nav-links">
            <li><a href="{{ url_for('index') }}">Home</a></li>
            <li><a href="{{ url_for('login') }}" class="btn btn-primary btn-sm">Login</a></li>
        </ul>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card fade-up">
            <div class="auth-logo">
                <div class="logo-icon"></div>
                <h2>Create a New Password</h2>
                <p>Reset your student account password</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for cat, msg in messages %}
            <div class="alert alert-{{ cat }}">{{ msg|safe }}</div>
            {% endfor %}{% endif %}
            {% endwith %}

            <form action="{{ url_for('forgot_password') }}" method="POST">
                <div class="form-group">
                    <label class="form-label">College Register Number</label>
                    <input type="text" name="register_number" class="form-control" placeholder="e.g. 21CS001" required
                        autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" name="new_password" class="form-control" placeholder="At least 8 characters" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="Re-type new password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;">
                    Update Password →
                </button>
            </form>

            <div class="divider"></div>
            <p class="text-center text-sm text-muted">
                Remembered your password? <a href="{{ url_for('login') }}">Sign In</a>
            </p>
        </div>
    </div>
</body>

</html>
