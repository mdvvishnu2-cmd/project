<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a New Password — CIVITAS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body style="background: var(--navy-mid);">
    <div class="auth-wrapper">
        <div class="auth-card fade-up">
            <div class="auth-logo">
                <div class="logo-icon" style="background: var(--danger);"></div>
                <h2>Admin Portal</h2>
                <p>Create a New Password</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for cat, msg in messages %}
            <div class="alert alert-{{ cat }}">{{ msg|safe }}</div>
            {% endfor %}{% endif %}
            {% endwith %}

            <form action="{{ url_for('admin_forgot_password') }}" method="POST">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" name="new_password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-danger btn-block" style="margin-top:0.5rem;">
                    Update Password
                </button>
            </form>

            <div class="divider"></div>
            <p class="text-center text-xs text-muted">
                <a href="{{ url_for('admin_login') }}" style="color:var(--gray-500);">← Back to Login</a>
            </p>
        </div>
    </div>
</body>

</html>
